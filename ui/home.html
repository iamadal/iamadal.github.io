<!DOCTYPE html>

<head>

<body>

   <!-- navigation system -nav  -->

         <a href="#"><i class="fas fa-home"></i>        Home   </a>

    <!-- contents -->
    <main class="content">

    </footer>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="home.css"/>
	<script src="home.js"></script>
    <style>
        /*Default Settings for mobile view*/

        html, body {font-family: 'Roboto'}
        header {border: 1px solid red; box-sizing: border-box;}
        /*---------------------------------------------------*/
        .head-section             {border: 1px solid #ddd;background: url("a.png") repeat; ; display: flex; flex-wrap: wrap; }
        .head-section .logo       {}
        .head-section .hTitle     {font-size: 1em; font-weight: 500; color: #75B931; margin-top: 1.4em; }
        .head-section .hTitle .sub{font-weight: 300; color:#3C6E1B;  }

        /* navbar */
        .navbar                 {background-color: #519c21; display: flex; box-shadow: 0 1px 2px 0 rgb(60 64 67 / 30%), 0 2px 6px 2px rgb(60 64 67 / 15%); }

        .navbar .icon           {background-color: #fff; padding: .4em}
        .navbar .icon:focus     {}
        .navbar .icon:hover     {background-color: #E4E6E7;   cursor: pointer;}

        .navbar a               {display: none;border-left: 1px solid #5fb833;font-family:'Roboto';font-weight: 300; font-size: .9em;text-decoration: none; color:#fff; display: block; padding: 10px;}
        .navbar a:hover         {background-color:#5fb833 }

        /* content */
        .content                        {}
        .content .content-main          {}
        .content .content-main .sliders {}
        
        .content .sidebar               {}

        /* footer */
        .footer .devs    {}
        .footer .contact {}
        .footer .connect {}



       /* handling large screen*/
       @media (min-width: 576px){
            .hTitle {color: red;}
       }

    </style>
